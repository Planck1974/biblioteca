<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Livros - Biblioteca</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f6f9; }
        nav { background: #1a3c5e; color: white; padding: 15px 30px; display: flex; align-items: center; justify-content: space-between; }
        nav h1 { font-size: 20px; }
        nav a { color: #bdd7ee; text-decoration: none; margin-left: 20px; font-size: 14px; }
        nav a:hover { color: white; }
        .btn-sair { background: #e74c3c; color: white; padding: 8px 16px; border-radius: 6px; font-size: 14px; margin-left: 20px; text-decoration: none; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .topo { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { color: #1a3c5e; }
        .btn { display: inline-block; padding: 9px 18px; background: #2e75b6; color: white; border-radius: 6px; text-decoration: none; font-size: 14px; border: none; cursor: pointer; }
        .btn-green { background: #28a745; }
        .btn-red { background: #dc3545; }
        .btn:hover { opacity: 0.85; }
        .alerta { padding: 12px 18px; border-radius: 6px; margin-bottom: 20px; }
        .alerta-sucesso { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alerta-erro { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        form.pesquisa { display: flex; gap: 10px; margin-bottom: 20px; }
        form.pesquisa input { padding: 9px 14px; border: 1px solid #ccc; border-radius: 6px; flex: 1; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        th { background: #1a3c5e; color: white; padding: 12px 15px; text-align: left; font-size: 13px; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 14px; color: #333; }
        tr:hover td { background: #f0f7ff; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-green { background: #d4edda; color: #155724; }
        .badge-red { background: #f8d7da; color: #721c24; }
        .acoes a { margin-right: 8px; }
    </style>
</head>
<body>
<nav>
    <h1>📚 Biblioteca Online</h1>
    <div>
        <a th:href="@{/}">Dashboard</a>
        <a th:href="@{/livros}">Livros</a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/utilizadores}">Utilizadores</a>
        <a th:href="@{/emprestimos}">Empréstimos</a>
        <a href="/logout" class="btn-sair">🚪 Sair</a>
    </div>
</nav>

<div class="container">
    <div class="topo">
        <h2>📖 Catálogo de Livros</h2>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/livros/novo}" class="btn btn-green">+ Novo Livro</a>
    </div>

    <div th:if="${sucesso}" class="alerta alerta-sucesso" th:text="${sucesso}"></div>
    <div th:if="${erro}" class="alerta alerta-erro" th:text="${erro}"></div>

    <form class="pesquisa" th:action="@{/livros}" method="get">
        <input type="text" name="pesquisa" placeholder="Pesquisar por título..." th:value="${pesquisa}"/>
        <button type="submit" class="btn">🔍 Pesquisar</button>
        <a th:href="@{/livros}" class="btn" style="background:#6c757d;">Limpar</a>
    </form>

    <table>
        <thead>
        <tr>
            <th>#</th>
            <th>Título</th>
            <th>Autor</th>
            <th>ISBN</th>
            <th>Categoria</th>
            <th>Ano</th>
            <th>Estado</th>
            <th sec:authorize="hasRole('ADMIN')">Acções</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="livro : ${livros}">
            <td th:text="${livro.id}"></td>
            <td th:text="${livro.titulo}"></td>
            <td th:text="${livro.autor}"></td>
            <td th:text="${livro.isbn}"></td>
            <td th:text="${livro.categoria}"></td>
            <td th:text="${livro.anoPublicacao}"></td>
            <td>
                <span th:if="${livro.disponivel}" class="badge badge-green">Disponível</span>
                <span th:unless="${livro.disponivel}" class="badge badge-red">Emprestado</span>
            </td>
            <td sec:authorize="hasRole('ADMIN')" class="acoes">
                <a th:href="@{/livros/editar/{id}(id=${livro.id})}" class="btn" style="padding:5px 12px; font-size:12px;">✏️ Editar</a>
                <a th:href="@{/livros/eliminar/{id}(id=${livro.id})}" class="btn btn-red" style="padding:5px 12px; font-size:12px;"
                   onclick="return confirm('Eliminar este livro?')">🗑️ Eliminar</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(livros)}">
            <td colspan="8" style="text-align:center; padding:30px; color:#999;">Nenhum livro encontrado.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
