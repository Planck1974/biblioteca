<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Login - Biblioteca</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a3c5e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: white; border-radius: 12px; padding: 45px 40px; width: 100%; max-width: 420px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { font-size: 28px; color: #1a3c5e; }
        .logo p { color: #888; font-size: 14px; margin-top: 5px; }
        .campo { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: bold; color: #333; margin-bottom: 6px; }
        input { width: 100%; padding: 11px 14px; border: 1px solid #ddd; border-radius: 7px; font-size: 14px; transition: border 0.2s; }
        input:focus { outline: none; border-color: #2e75b6; }
        .btn { width: 100%; padding: 12px; background: #1a3c5e; color: white; border: none; border-radius: 7px; font-size: 15px; cursor: pointer; margin-top: 8px; font-weight: bold; }
        .btn:hover { background: #2e75b6; }
        .alerta { padding: 11px 15px; border-radius: 7px; margin-bottom: 18px; font-size: 13px; }
        .alerta-erro { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alerta-sucesso { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alerta-info { background: #cce5ff; color: #004085; border: 1px solid #b8daff; }
        .rodape { text-align: center; margin-top: 22px; font-size: 13px; color: #666; }
        .rodape a { color: #2e75b6; text-decoration: none; font-weight: bold; }
        .rodape a:hover { text-decoration: underline; }
        .divider { border: none; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <h1>📚 Biblioteca</h1>
        <p>Sistema de Gestão Online</p>
    </div>

    <!-- Alertas -->
    <div th:if="${erro}" class="alerta alerta-erro" th:text="${erro}"></div>
    <div th:if="${sucesso}" class="alerta alerta-sucesso" th:text="${sucesso}"></div>
    <div th:if="${logout}" class="alerta alerta-sucesso" th:text="${logout}"></div>

    <!-- Credenciais padrão -->
    <div class="alerta alerta-info">
        🔑 <strong>Admin padrão:</strong> admin@biblioteca.com / admin123
    </div>

    <!-- Formulário de Login -->
    <form th:action="@{/auth/login}" method="post">
        <div class="campo">
            <label>Email</label>
            <input type="email" name="username" placeholder="email@exemplo.com" required autofocus/>
        </div>
        <div class="campo">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn">Entrar →</button>
    </form>

    <hr class="divider"/>

    <div class="rodape">
        Não tem conta? <a th:href="@{/auth/registar}">Registar aqui</a>
    </div>
</div>
</body>
</html>
