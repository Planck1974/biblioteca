<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Utilizador - Biblioteca</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f6f9; }
        nav { background: #1a3c5e; color: white; padding: 15px 30px; display: flex; align-items: center; justify-content: space-between; }
        nav h1 { font-size: 20px; }
        nav a { color: #bdd7ee; text-decoration: none; margin-left: 20px; }
        .container { max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h2 { color: #1a3c5e; margin-bottom: 25px; }
        .form-card { background: white; border-radius: 10px; padding: 35px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .campo { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: bold; color: #333; margin-bottom: 6px; }
        input { width: 100%; padding: 10px 14px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        input:focus { outline: none; border-color: #2e75b6; }
        .erro { color: #dc3545; font-size: 12px; margin-top: 4px; }
        .botoes { display: flex; gap: 12px; margin-top: 25px; }
        .btn { padding: 10px 22px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block; }
        .btn-blue { background: #2e75b6; color: white; }
        .btn-gray { background: #6c757d; color: white; }
        .btn:hover { opacity: 0.85; }
    </style>
</head>
<body>
<nav>
    <h1>📚 Biblioteca Online</h1>
    <div>
        <a th:href="@{/}">Dashboard</a>
        <a th:href="@{/utilizadores}">Utilizadores</a>
    </div>
</nav>

<div class="container">
    <h2 th:text="${utilizador.id == null} ? 'Cadastrar Utilizador' : 'Editar Utilizador'">Utilizador</h2>

    <div class="form-card">
        <form th:action="@{/utilizadores/salvar}" th:object="${utilizador}" method="post">
            <input type="hidden" th:field="*{id}"/>

            <div class="campo">
                <label>Nome Completo *</label>
                <input type="text" th:field="*{nome}" placeholder="Ex: João Silva"/>
                <div class="erro" th:errors="*{nome}"></div>
            </div>

            <div class="campo">
                <label>Email *</label>
                <input type="email" th:field="*{email}" placeholder="Ex: joao@email.com"/>
                <div class="erro" th:errors="*{email}"></div>
            </div>

            <div class="campo">
                <label>Telefone</label>
                <input type="text" th:field="*{telefone}" placeholder="Ex: +258 84 000 0000"/>
            </div>

            <div class="campo">
                <label>Número do Cartão de Biblioteca</label>
                <input type="text" th:field="*{numeroCartao}" placeholder="Ex: BIB-2024-001"/>
            </div>

            <div class="botoes">
                <button type="submit" class="btn btn-blue">💾 Guardar</button>
                <a th:href="@{/utilizadores}" class="btn btn-gray">✖ Cancelar</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
