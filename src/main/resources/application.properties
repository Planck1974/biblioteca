# Usando a variável oficial do Railway para evitar erros de endereço
spring.datasource.url=jdbc:${DATABASE_URL}
spring.datasource.username=postgres
spring.datasource.password=XPVTdcXVmRttyHotfZVZfVHkRVylKVMc
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# O 'update' criará as tabelas ravin automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Thymeleaf
spring.thymeleaf.cache=false

# Servidor
# Garanta que a variável PORT no painel do Railway seja 9090
server.port=${PORT:9090}